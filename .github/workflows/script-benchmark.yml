name: Scripting Benchmark

on:
  workflow_dispatch:
    inputs:
      jmh_args:
        description: "Extra JMH args, e.g. --forks 1 --warmup 3 --measure 5"
        required: false
        default: ""
        type: string
      enable_jfr:
        description: "Enable Java Flight Recorder"
        required: true
        default: false
        type: boolean

jobs:
  prepare-matrix:
    name: Prepare benchmark matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      extra_jmh_args: ${{ steps.matrix.outputs.extra_jmh_args }}

    steps:
      - name: Build matrix from JMH args
        id: matrix
        env:
          INPUT_JMH_ARGS: ${{ inputs.jmh_args }}
        run: |
          python3 <<'PY'
          import json
          import os
          import re
          import shlex

          ENGINES = [
              "GraalJS",
              "Nashorn",
              "Jexl",
              "KotlinScripting",
              "KotlinScriptingOptimized",
              "Fluxon",
          ]
          PHASES = ["compile", "compiledExecution", "interpretedExecution"]

          tokens = shlex.split(os.environ.get("INPUT_JMH_ARGS", ""))

          def take_option(name, default):
              if name not in tokens:
                  return default
              index = tokens.index(name)
              if index + 1 >= len(tokens):
                  raise SystemExit(f"{name} 需要一个值")
              value = tokens[index + 1]
              del tokens[index:index + 2]
              return value

          engine_pattern = take_option("--engine", ".*")
          phase = take_option("--phase", "all")

          engines = [engine for engine in ENGINES if re.fullmatch(engine_pattern, engine)]
          if not engines:
              raise SystemExit(f"--engine 没有匹配任何引擎: {engine_pattern}")
          if phase not in ["all", *PHASES]:
              raise SystemExit("--phase 仅支持 compile / compiledExecution / interpretedExecution / all")

          phases = PHASES if phase == "all" else [phase]
          extra_args = shlex.join(tokens)
          matrix = {"include": [{"engine": engine, "phase": phase} for engine in engines for phase in phases]}

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"matrix={json.dumps(matrix, separators=(',', ':'))}\n")
              output.write(f"extra_jmh_args<<EOF\n{extra_args}\nEOF\n")
          PY

  benchmark:
    name: ${{ matrix.engine }} / ${{ matrix.phase }}
    runs-on: ubuntu-latest
    needs: prepare-matrix
    env:
      JAVA_TOOL_OPTIONS: >-
        --enable-native-access=ALL-UNNAMED
        --sun-misc-unsafe-memory-access=allow
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare-matrix.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Java
        uses: graalvm/setup-graalvm@v1
        with:
          distribution: graalvm
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          add-job-summary: never

      - name: Prepare Gradle wrapper
        run: chmod +x ./gradlew

      - name: Run benchmark
        env:
          EXTRA_JMH_ARGS: ${{ needs.prepare-matrix.outputs.extra_jmh_args }}
          ENABLE_JFR: ${{ inputs.enable_jfr }}
          MATRIX_ENGINE: ${{ matrix.engine }}
          MATRIX_PHASE: ${{ matrix.phase }}
        run: |
          mkdir -p build/reports/jmh build/reports/jfr
          JMH_ARGS="--quick --engine $MATRIX_ENGINE --phase $MATRIX_PHASE ${EXTRA_JMH_ARGS:-}"

          if [[ "$ENABLE_JFR" == "true" ]]; then
            ./gradlew runScriptBenchmark -PenableJfr=true -PjmhArgs="$JMH_ARGS"
          else
            ./gradlew runScriptBenchmark -PjmhArgs="$JMH_ARGS"
          fi

      - name: Collect benchmark files
        if: always()
        env:
          MATRIX_ENGINE: ${{ matrix.engine }}
          MATRIX_PHASE: ${{ matrix.phase }}
        run: |
          mkdir -p build/reports/jmh/results build/reports/jfr
          if [[ -f build/reports/jmh/results.json ]]; then
            cp build/reports/jmh/results.json "build/reports/jmh/results/results-${MATRIX_ENGINE}-${MATRIX_PHASE}.json"
          fi
          find . -maxdepth 2 -type f -name '*.jfr' ! -path './build/reports/jfr/*' -exec mv '{}' build/reports/jfr/ \;

      - name: Upload JMH artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jmh-results-${{ matrix.engine }}-${{ matrix.phase }}-${{ github.run_number }}
          if-no-files-found: ignore
          retention-days: 14
          path: build/reports/jmh/results/*.json

      - name: Upload JFR artifacts
        if: always() && inputs.enable_jfr == true
        uses: actions/upload-artifact@v7
        with:
          name: jfr-results-${{ matrix.engine }}-${{ matrix.phase }}-${{ github.run_number }}
          if-no-files-found: ignore
          retention-days: 14
          path: build/reports/jfr/*.jfr

  report:
    name: Merge benchmark report
    runs-on: ubuntu-latest
    needs:
      - prepare-matrix
      - benchmark
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Download JMH artifacts
        uses: actions/download-artifact@v7
        continue-on-error: true
        with:
          pattern: jmh-results-*-${{ github.run_number }}
          path: build/reports/jmh/downloaded
          merge-multiple: true

      - name: Download JFR artifacts
        if: inputs.enable_jfr == true
        uses: actions/download-artifact@v7
        continue-on-error: true
        with:
          pattern: jfr-results-*-${{ github.run_number }}
          path: build/reports/jfr/downloaded
          merge-multiple: false

      - name: Generate JMH report
        env:
          INPUT_JMH_ARGS: ${{ inputs.jmh_args }}
        run: |
          mkdir -p build/reports/jmh
          if [[ -n "$(find build/reports/jmh/downloaded -type f -name '*.json' -print -quit 2>/dev/null)" ]]; then
            python3 scripts/generate-jmh-report.py \
              --input build/reports/jmh/downloaded \
              --output build/reports/jmh/report.md \
              --jfr "false" \
              --args "GitHub Actions matrix: --quick ${INPUT_JMH_ARGS:-}"
          else
            cat > build/reports/jmh/report.md <<'EOF'
          # 脚本引擎 JMH 性能测试报告

          本次执行未下载到任何 JMH JSON 结果。
          EOF
          fi

      - name: Generate JFR report
        if: inputs.enable_jfr == true
        run: |
          mkdir -p build/reports/jfr
          if [[ -n "$(find build/reports/jfr/downloaded -type f -name '*.jfr' -print -quit 2>/dev/null)" ]]; then
            python3 scripts/analyze-jfr.py \
              --input build/reports/jfr/downloaded \
              --output build/reports/jfr/report.md
          else
            cat > build/reports/jfr/report.md <<'EOF'
          # JFR 性能分析报告

          未找到 JFR 文件。
          EOF
          fi

      - name: Generate summary report
        env:
          MATRIX_JSON: ${{ needs.prepare-matrix.outputs.matrix }}
          INPUT_JMH_ARGS: ${{ inputs.jmh_args }}
          ENABLE_JFR: ${{ inputs.enable_jfr }}
        run: |
          mkdir -p build/reports
          python3 scripts/generate-benchmark-report.py \
            --jmh-report build/reports/jmh/report.md \
            --jfr-report build/reports/jfr/report.md \
            --output build/reports/summary.md \
            --matrix-json "$MATRIX_JSON" \
            --jmh-args "--quick ${INPUT_JMH_ARGS:-}" \
            --enable-jfr "$ENABLE_JFR"

      - name: Publish summary to job summary
        run: cat build/reports/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload JMH report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jmh-report-${{ github.run_number }}
          if-no-files-found: warn
          path: build/reports/jmh/**

      - name: Upload JFR report
        if: always() && inputs.enable_jfr == true
        uses: actions/upload-artifact@v7
        with:
          name: jfr-report-${{ github.run_number }}
          if-no-files-found: warn
          path: build/reports/jfr/**

      - name: Upload summary report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-summary-${{ github.run_number }}
          if-no-files-found: warn
          path: build/reports/summary.md
