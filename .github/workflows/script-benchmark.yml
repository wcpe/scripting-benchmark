name: Scripting Benchmark

on:
  workflow_dispatch:
    inputs:
      jmh_args:
        description: "Extra JMH args, e.g. --quick --engine GraalJS --case compute"
        required: false
        default: ""
        type: string
      enable_jfr:
        description: "Enable Java Flight Recorder for JMH fork JVMs"
        required: true
        default: false
        type: boolean

jobs:
  benchmark:
    name: Run script benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Java
        uses: graalvm/setup-graalvm@v1
        with:
          distribution: graalvm
          java-version: "25"

      - name: Prepare Gradle wrapper
        run: chmod +x ./gradlew

      - name: Run Benchmark
        env:
          INPUT_JMH_ARGS: ${{ inputs.jmh_args }}
          ENABLE_JFR: ${{ inputs.enable_jfr }}
        run: |
          mkdir -p build/reports/jmh build/reports/jfr
          JMH_ARGS="${INPUT_JMH_ARGS:-}"
          if [[ "$ENABLE_JFR" == "true" ]]; then
            ./gradlew runScriptBenchmark -PenableJfr=true -PjmhArgs="$JMH_ARGS"
          else
            ./gradlew runScriptBenchmark -PjmhArgs="$JMH_ARGS"
          fi

      - name: Collect JFR files
        if: always()
        run: |
          mkdir -p build/reports/jfr
          find . -maxdepth 2 -type f -name '*.jfr' ! -path './build/reports/jfr/*' -exec mv '{}' build/reports/jfr/ \;
          ls -la build/reports/jfr || true

      - name: Generate Markdown report
        if: always()
        env:
          INPUT_JMH_ARGS: ${{ inputs.jmh_args }}
          ENABLE_JFR: ${{ inputs.enable_jfr }}
        run: |
          mkdir -p build/reports/jmh
          if [[ -f build/reports/jmh/results.json ]]; then
            python3 scripts/generate-jmh-report.py \
              --input build/reports/jmh/results.json \
              --output build/reports/jmh/report.md \
              --jfr "$ENABLE_JFR" \
              --args "${INPUT_JMH_ARGS:-}"
          else
            cat > build/reports/jmh/report.md <<'EOF'
          # 脚本引擎 JMH 性能测试报告

          本次执行未生成 `build/reports/jmh/results.json`。
          请查看上传的 Gradle/JMH 日志与其它产物定位原因。
          EOF
          fi

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: script-jmh-benchmark-${{ github.run_number }}
          if-no-files-found: warn
          path: |
            build/reports/**
